name: 🧹 Code Quality

on:
  push:
    branches: [main, dev]
    paths:
      - "app/**"
  pull_request:
    branches: [main]
    paths:
      - "app/**"

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Run Android Lint
        working-directory: app
        run: gradle lint --no-daemon

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-*.html
          retention-days: 7

      - name: Annotate lint issues
        uses: yutailang0119/action-android-lint@v4
        if: always()
        with:
          report-path: app/build/reports/lint-results-*.xml

  ktlint:
    name: Kotlin Style (ktlint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ktlint
        uses: nbadal/action-ktlint-setup@v1

      - name: Check Kotlin formatting
        run: ktlint "app/src/**/*.kt" --reporter=checkstyle,output=ktlint-report.xml || true

      - name: Upload ktlint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ktlint-report-${{ github.sha }}
          path: ktlint-report.xml
          retention-days: 7
