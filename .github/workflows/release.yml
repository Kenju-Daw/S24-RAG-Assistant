name: 🚀 Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Project Claw ${{ github.ref_name }}"
          body: |
            ## Project Claw ${{ github.ref_name }}

            Headless Android LiteRT-LM inference engine.

            ### Install
            ```bash
            adb install -r project-claw-release.apk
            adb shell am start-foreground-service \
              com.kenjudaw.projectclaw/.InferenceService
            ```

            ### Test
            ```bash
            curl -X POST http://127.0.0.1:8080/v1/chat/completions \
              -H "Content-Type: application/json" \
              -d '{"model":"gemma-4-e2b","messages":[{"role":"user","content":"Hello"}]}'
            ```
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
