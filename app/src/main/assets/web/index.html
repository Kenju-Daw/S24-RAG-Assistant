<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Claw - Web Interface</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #1a73e8; color: white; padding: 16px; text-align: center; font-size: 1.2em; font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .user { align-self: flex-end; background: #1a73e8; color: white; }
        .ai { align-self: flex-start; background: white; color: #333; border: 1px solid #ddd; white-space: pre-wrap; }
        #input-area { background: white; padding: 12px; display: flex; border-top: 1px solid #ddd; gap: 8px; }
        input { flex: 1; border: 1px solid #ccc; border-radius: 24px; padding: 10px 16px; outline: none; font-size: 16px; }
        button { background: #1a73e8; color: white; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        button:disabled { background: #ccc; }
        .controls { display: flex; justify-content: center; gap: 16px; padding: 8px; background: #eee; border-top: 1px solid #ddd; }
        .control-btn { font-size: 24px; cursor: pointer; filter: grayscale(1); }
        .control-btn.active { filter: grayscale(0); transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="header">🦾 Project Claw</div>
    <div id="chat">
        <div class="msg ai">Welcome to Project Claw! I'm running locally on your phone.</div>
    </div>
    <div class="controls">
        <span id="btn-text" class="control-btn active" title="Text Mode">💬</span>
        <span id="btn-image" class="control-btn" title="Image Mode (Coming Soon)">🖼️</span>
        <span id="btn-voice" class="control-btn" title="Voice Mode (Coming Soon)">🎙️</span>
    </div>
    <div id="input-area">
        <input type="text" id="prompt" placeholder="Message Project Claw..." autocomplete="off">
        <button id="send-btn">➔</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const promptInput = document.getElementById('prompt');
        const sendBtn = document.getElementById('send-btn');

        async function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.textContent = content;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = promptInput.value.trim();
            if (!text || sendBtn.disabled) return;

            promptInput.value = '';
            sendBtn.disabled = true;
            appendMessage('user', text);

            const aiMsg = await appendMessage('ai', '');

            try {
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'gemma',
                        messages: [{ role: 'user', content: text }],
                        stream: true
                    })
                });

                if (!response.ok) throw new Error('Inference failed');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (dataStr === '[DONE]') continue;
                            try {
                                const json = JSON.parse(dataStr);
                                const token = json.choices[0].delta.content;
                                if (token) {
                                    aiMsg.textContent += token;
                                    chat.scrollTop = chat.scrollHeight;
                                }
                            } catch (e) { }
                        }
                    }
                }
            } catch (err) {
                aiMsg.textContent = 'Error: ' + err.message;
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        promptInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
